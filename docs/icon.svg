<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241712"/>
      <stop offset="0.55" stop-color="#2a1714"/>
      <stop offset="1" stop-color="#3d1a12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#7a1f17" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#7a1f17" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>

  <!-- 底部迷你 K 线（红涨绿跌） -->
  <g stroke-linecap="round" opacity="0.9">
    <!-- wicks + bodies -->
    <g stroke="#1b8a5a">
      <line x1="120" y1="392" x2="120" y2="436" stroke-width="6"/>
      <rect x="111" y="400" width="18" height="28" rx="3" fill="#1b8a5a" stroke="none"/>
    </g>
    <g stroke="#e8503a">
      <line x1="172" y1="378" x2="172" y2="440" stroke-width="6"/>
      <rect x="163" y="388" width="18" height="40" rx="3" fill="#e8503a" stroke="none"/>
    </g>
    <g stroke="#e8503a">
      <line x1="340" y1="372" x2="340" y2="444" stroke-width="6"/>
      <rect x="331" y="384" width="18" height="46" rx="3" fill="#e8503a" stroke="none"/>
    </g>
    <g stroke="#1b8a5a">
      <line x1="392" y1="396" x2="392" y2="438" stroke-width="6"/>
      <rect x="383" y="404" width="18" height="24" rx="3" fill="#1b8a5a" stroke="none"/>
    </g>
  </g>

  <!-- X：红色那笔上扬(涨) + 绿色那笔下行(跌) -->
  <g stroke-width="54" stroke-linecap="round" fill="none">
    <line x1="150" y1="150" x2="362" y2="356" stroke="#1b8a5a"/>     <!-- 绿跌：左上→右下 -->
    <line x1="150" y1="356" x2="362" y2="150" stroke="#e8503a"/>     <!-- 红涨：左下→右上（压在上层） -->
  </g>
</svg>
